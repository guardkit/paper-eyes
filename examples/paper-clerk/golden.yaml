      FIELDS
      children[0].date_of_birth: 2019-12-26
      children[0].first_names: Joel
      children[0].full_name: Joel Thomas
      children[1].full_name: Hayley Thomas
      claimant.date_of_birth: 1989-08-25
      claimant.full_name: Brandon Thomas
      claimant.nino: BN605990B
      claimant.postcode: S13 9ZD
      claimant.title: Ms
      ----------------------------------------------------------------
      PROVENANCE (deterministic subset — timings live in provenance.json)
      regions_triggered: claimant-nino-grid, child-details
    reference: "title: CH2 Child Benefit claim — Brandon Thomas | folder: child-benefit | tags: ch2, child-benefit, hmrc"

