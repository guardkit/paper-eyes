# Malformed: an unknown top-level key (extra='forbid' must reject it).
formpack: demo-form
version: 1
display_name: "Demo"
bogus_key: 1
source_form:
  url: "https://example.gov/x.pdf"
  licence: "OGL v3"
identify:
  all_of_patterns: ["(?i)demo"]
extraction:
  schema: schema.json
  system_prompt: "Extract JSON."
  max_tokens: 4096
report:
  headline_fields: ["a.b"]
golden:
  field_accuracy_floor: 0.95
  required_fields: ["a.b"]
