# Malformed: an accuracy floor above 1.0 (must be a fraction in [0, 1]).
formpack: demo-form
version: 1
display_name: "Demo"
source_form:
  url: "https://example.gov/x.pdf"
  licence: "OGL v3"
identify:
  all_of_patterns: ["(?i)demo"]
