# Malformed: a region locator whose `kind` is not one of the two known kinds.
formpack: demo-form
version: 1
display_name: "Demo"
source_form:
  url: "https://example.gov/x.pdf"
  licence: "OGL v3"
identify:
  all_of_patterns: ["(?i)demo"]
regions:
  - id: mystery
    locate:
      kind: magic
      min_width: 10
      min_height: 10
      max_width: 100
      page_range: [1, 1]
    vlm:
      prompt: "Transcribe."
      max_tokens: 256
    splice: replace_placeholder
extraction:
  schema: schema.json
  system_prompt: "Extract JSON."
  max_tokens: 4096
report:
  headline_fields: ["a.b"]
golden:
  field_accuracy_floor: 0.95
  required_fields: ["a.b"]
